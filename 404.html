<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>404 — Página derreteu | Brothers Sorveteria</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Ops! Esta página derreteu antes de chegar até você. Volte para a home da Brothers Sorveteria." />
<meta name="theme-color" content="#3E1B4F" />
<meta name="robots" content="noindex,follow" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#F5C518; --yellow-soft:#FFE9A0;
    --acai:#3E1B4F; --cream:#FFFFFF; --ink:#2A1136;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--cream);color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:40px 24px;text-align:center;overflow:hidden;position:relative;
  }
  .bg{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;user-select:none;z-index:0;
  }
  .bg span{
    font-family:'Anton',sans-serif;font-size:clamp(280px,55vw,720px);
    color:var(--yellow);line-height:.85;letter-spacing:-.04em;
  }
  .card{
    position:relative;z-index:1;max-width:560px;
    display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .logo{
    font-family:'Yellowtail',cursive;font-size:54px;color:var(--acai);line-height:.9;margin-bottom:12px;
  }
  .logo small{display:block;font-weight:700;font-size:10px;letter-spacing:.32em;text-align:center;margin-top:-4px;font-family:'DM Sans',sans-serif}
  .eyebrow{
    font-weight:700;font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--acai);padding-bottom:6px;border-bottom:1.5px solid var(--acai);
  }
  h1{
    font-family:'Anton',sans-serif;font-size:clamp(38px,5vw,64px);
    color:var(--acai);line-height:1;letter-spacing:.01em;
  }
  h1 em{font-family:'Yellowtail',cursive;font-style:normal;font-size:.7em;display:block;margin-top:6px}
  p{font-size:16px;line-height:1.6;color:rgba(42,17,54,.78);max-width:440px;margin-top:6px}
  .actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:16px}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:16px 28px;border-radius:999px;
    font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.06em;
    text-decoration:none;transition:transform .2s ease, background .2s ease, color .2s ease;
  }
  .btn.primary{background:var(--acai);color:var(--yellow)}
  .btn.primary:hover{background:var(--yellow);color:var(--acai);transform:translateY(-2px)}
  .btn.ghost{color:var(--acai);border:2px solid var(--acai)}
  .btn.ghost:hover{background:var(--acai);color:var(--yellow);transform:translateY(-2px)}
  :focus-visible{outline:3px solid var(--acai);outline-offset:3px;border-radius:6px}

  @media (max-width:480px){
    .logo{font-size:44px}
    .actions{flex-direction:column;width:100%}
    .btn{width:100%;justify-content:center}
  }
  @media (prefers-reduced-motion: reduce){
    .btn:hover{transform:none}
  }
</style>
</head>
<body>

<div class="bg" aria-hidden="true"><span>404</span></div>

<main class="card">
  <a href="index.html" class="logo" aria-label="Voltar à página inicial da Brothers">
    Brothers
    <small>SORVETERIA · AÇAÍTERIA</small>
  </a>
  <span class="eyebrow">Erro 404</span>
  <h1>ESSA PÁGINA<br/><em>derreteu.</em></h1>
  <p>Não conseguimos encontrar o que você procura. Mas a casquinha tá pronta — bora pra home?</p>
  <div class="actions">
    <a href="index.html" class="btn primary">VOLTAR PARA A HOME</a>
    <a href="Contato.html" class="btn ghost">FALAR COM A GENTE</a>
  </div>
</main>

</body>
</html>
